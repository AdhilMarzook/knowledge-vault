server.port=8080

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=knowledge-vault
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token.expiry-ms=900000
jwt.refresh-token.expiry-ms=604800000

# ── AI Providers (all optional — at least one must be set) ───────────────────
# Free providers (use these first):
ai.groq.api-key=${AI_GROQ_API_KEY:}
ai.gemini.api-key=${AI_GEMINI_API_KEY:}
ai.mistral.api-key=${AI_MISTRAL_API_KEY:}
ai.openrouter.api-key=${AI_OPENROUTER_API_KEY:}
# Paid fallback (only used if all free providers fail):
ai.claude.api-key=${AI_CLAUDE_API_KEY:}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# ── Error hardening ───────────────────────────────────────────────────────────
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.whitelabel.enabled=false

# ── Server hardening ──────────────────────────────────────────────────────────
server.server-header=
server.connection-timeout=20s
server.max-http-request-header-size=8KB

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/internal
management.server.port=9090

# ── Virtual Threads (Java 21) ─────────────────────────────────────────────────
spring.threads.virtual.enabled=true

# ── Session: stateless ────────────────────────────────────────────────────────
spring.session.store-type=none

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.com.knowledgevault=INFO
logging.level.io.jsonwebtoken=WARN

# ── AI Providers (free-first priority chain) ──────────────────────────────────
# 1. Groq — FREE — https://console.groq.com
ai.groq.api-key=${GROQ_API_KEY:}

# 2. Google Gemini — FREE — https://aistudio.google.com/apikey
ai.gemini.api-key=${GEMINI_API_KEY:}

# 3. OpenRouter — FREE models — https://openrouter.ai
ai.openrouter.api-key=${OPENROUTER_API_KEY:}

# 4. Mistral — FREE (rate limited) — https://console.mistral.ai
ai.mistral.api-key=${MISTRAL_API_KEY:}

# 5. Claude Haiku — PAID last resort — https://console.anthropic.com
ai.claude.api-key=${ANTHROPIC_API_KEY:}
